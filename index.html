<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- ホーム画面に追加するとブラウザUIなしで起動（iOS / Android） -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fogged Window">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.webmanifest">
<title>Fogged Window</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    color: #fff;
    touch-action: none;
    overscroll-behavior: none;
  }
  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    cursor: grab;
  }
  .stage.dragging { cursor: grabbing; }
  .photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
  }
  .fog {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .toolbar {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .toolbar button {
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.4s ease;
  }
  .toolbar button:hover {
    background: rgba(0,0,0,0.55);
  }
  .toolbar button:active svg {
    transform: rotate(-360deg);
    transition: transform 0.5s ease;
  }
  .toolbar button svg {
    transition: transform 0.4s ease;
  }
  .spinner {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.22);
    border-top-color: rgba(255,255,255,0.9);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    transform: translate(-50%, -50%);
  }
  .spinner.show {
    opacity: 1;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <img id="photo" class="photo" alt="" crossorigin="anonymous"
         src="https://picsum.photos/seed/window-spring/1600/1000">
    <canvas id="fog" class="fog"></canvas>
  </div>

  <div class="spinner" id="spinner" role="status" aria-label="読み込み中"></div>

  <div class="toolbar">
    <button id="reload" aria-label="景色を入れ替える">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    </button>
  </div>

<script>
(() => {
  const stage  = document.getElementById('stage');
  const photo  = document.getElementById('photo');
  const canvas = document.getElementById('fog');
  const ctx    = canvas.getContext('2d');
  const reloadBtn = document.getElementById('reload');
  const spinner = document.getElementById('spinner');
  const setLoading = (on) => spinner.classList.toggle('show', on);

  let dpr = Math.max(1, window.devicePixelRatio || 1);
  let lastPoint = null;
  let lastSoundPoint = null;
  let lastSoundTime = 0;
  let lastSqueakAt = 0;
  let soundEnabled = true;
  let audio = null;

  function paintFog() {
    const w = canvas.width;
    const h = canvas.height;
    const cssW = canvas.clientWidth;
    const cssH = canvas.clientHeight;

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, w, h);

    // 強くぼかした写真を下地として描く（曇りガラス越しの光景）
    ctx.filter = 'blur(28px) saturate(0.85) brightness(1.05)';
    // 画像を object-fit: cover 相当で描画
    const ir = photo.naturalWidth / photo.naturalHeight;
    const cr = cssW / cssH;
    let dw, dh, dx, dy;
    if (ir > cr) {
      dh = cssH;
      dw = cssH * ir;
      dx = (cssW - dw) / 2;
      dy = 0;
    } else {
      dw = cssW;
      dh = cssW / ir;
      dx = 0;
      dy = (cssH - dh) / 2;
    }
    ctx.scale(dpr, dpr);
    // ブラーが端で薄まらないように少し外側まで描く
    ctx.drawImage(photo, dx - 40, dy - 40, dw + 80, dh + 80);
    ctx.filter = 'none';

    // 白っぽい霜のレイヤー
    ctx.fillStyle = 'rgba(232, 240, 248, 0.55)';
    ctx.fillRect(0, 0, cssW, cssH);

    // 細かいノイズで磨りガラスの粒状感
    const noise = makeNoise(Math.ceil(cssW), Math.ceil(cssH), 0.08);
    ctx.globalAlpha = 0.35;
    ctx.drawImage(noise, 0, 0);
    ctx.globalAlpha = 1;
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    drawPrecleared();
  }

  // 始めから少しだけなぞってある領域：一筆書きの蛇行ストローク
  function drawPrecleared() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    const margin = Math.min(w, h) * 0.15;
    const minDist = Math.min(w, h) * 0.22;

    // 5〜7 個のウェイポイントを最小間隔をもたせて配置
    const n = 5 + Math.floor(Math.random() * 3);
    const pts = [];
    let guard = 0;
    while (pts.length < n && guard++ < 400) {
      const p = {
        x: margin + Math.random() * (w - 2 * margin),
        y: margin + Math.random() * (h - 2 * margin),
      };
      const last = pts[pts.length - 1];
      if (last && Math.hypot(p.x - last.x, p.y - last.y) < minDist) continue;
      pts.push(p);
    }

    // Catmull-Rom で滑らかに繋いで密にサンプリング → 一本の連続したなぞり跡に
    let prev = null;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[Math.max(0, i - 1)];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[Math.min(pts.length - 1, i + 2)];
      const segLen = Math.hypot(p2.x - p1.x, p2.y - p1.y);
      const steps = Math.max(12, Math.floor(segLen / 5));
      for (let s = 0; s < steps; s++) {
        const t = s / steps;
        const t2 = t * t, t3 = t2 * t;
        const x = 0.5 * (2*p1.x + (-p0.x + p2.x) * t
               + (2*p0.x - 5*p1.x + 4*p2.x - p3.x) * t2
               + (-p0.x + 3*p1.x - 3*p2.x + p3.x) * t3);
        const y = 0.5 * (2*p1.y + (-p0.y + p2.y) * t
               + (2*p0.y - 5*p1.y + 4*p2.y - p3.y) * t2
               + (-p0.y + 3*p1.y - 3*p2.y + p3.y) * t3);
        eraseAt(x, y, prev);
        prev = { x, y };
      }
    }
    const tail = pts[pts.length - 1];
    eraseAt(tail.x, tail.y, prev);
  }

  function makeNoise(w, h, intensity) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const x = c.getContext('2d');
    const img = x.createImageData(w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = 200 + (Math.random() - 0.5) * 255 * intensity * 4;
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = 255;
    }
    x.putImageData(img, 0, 0);
    return c;
  }

  function resize() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = stage.clientWidth;
    const h = stage.clientHeight;
    canvas.width  = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    if (photo.complete && photo.naturalWidth > 0) paintFog();
  }

  function eraseAt(x, y, prev) {
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 56;

    const grad = ctx.createRadialGradient(x, y, 0, x, y, 40);
    grad.addColorStop(0,   'rgba(0,0,0,1)');
    grad.addColorStop(0.6, 'rgba(0,0,0,0.6)');
    grad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, 40, 0, Math.PI * 2);
    ctx.fill();

    if (prev) {
      ctx.strokeStyle = 'rgba(0,0,0,0.85)';
      ctx.beginPath();
      ctx.moveTo(prev.x, prev.y);
      ctx.lineTo(x, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  function initAudio() {
    if (audio) return audio;
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) {
      soundEnabled = false;
      return null;
    }

    const audioCtx = new AudioCtx();
    const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.8;
    }

    const source = audioCtx.createBufferSource();
    const highpass = audioCtx.createBiquadFilter();
    const bandpass = audioCtx.createBiquadFilter();
    const gain = audioCtx.createGain();
    const squeak = audioCtx.createOscillator();
    const squeakFilter = audioCtx.createBiquadFilter();
    const squeakGain = audioCtx.createGain();
    const master = audioCtx.createGain();

    source.buffer = noiseBuffer;
    source.loop = true;
    highpass.type = 'highpass';
    highpass.frequency.value = 900;
    bandpass.type = 'bandpass';
    bandpass.frequency.value = 3600;
    bandpass.Q.value = 3.8;
    gain.gain.value = 0;
    squeak.type = 'triangle';
    squeak.frequency.value = 3600;
    squeakFilter.type = 'bandpass';
    squeakFilter.frequency.value = 4300;
    squeakFilter.Q.value = 14;
    squeakGain.gain.value = 0;
    master.gain.value = 0.5;

    source.connect(highpass);
    highpass.connect(bandpass);
    bandpass.connect(gain);
    gain.connect(master);
    squeak.connect(squeakFilter);
    squeakFilter.connect(squeakGain);
    squeakGain.connect(master);
    master.connect(audioCtx.destination);
    source.start();
    squeak.start();

    audio = { audioCtx, bandpass, gain, squeak, squeakFilter, squeakGain };
    return audio;
  }

  function setScrubSound(speed, distance = 0) {
    if (!soundEnabled) return;
    const graph = initAudio();
    if (!graph) return;
    if (graph.audioCtx.state === 'suspended') graph.audioCtx.resume();

    const now = graph.audioCtx.currentTime;
    const intensity = Math.min(1, Math.max(0, speed / 1200));
    const level = 0.002 + Math.pow(intensity, 1.05) * 0.016;
    const freq = 3000 + intensity * 3200 + Math.random() * 360;

    graph.gain.gain.cancelScheduledValues(now);
    graph.gain.gain.setTargetAtTime(level, now, 0.014);
    graph.bandpass.frequency.cancelScheduledValues(now);
    graph.bandpass.frequency.setTargetAtTime(freq, now, 0.02);

    if (intensity > 0.12 && distance > 2.5 && now - lastSqueakAt > 0.035) {
      const pitch = 3300 + intensity * 4300 + Math.random() * 520;
      const peak = 0.026 + intensity * 0.11;
      lastSqueakAt = now;

      graph.squeak.frequency.cancelScheduledValues(now);
      graph.squeak.frequency.setValueAtTime(pitch * 0.78, now);
      graph.squeak.frequency.exponentialRampToValueAtTime(pitch, now + 0.01);
      graph.squeak.frequency.exponentialRampToValueAtTime(pitch * 0.58, now + 0.055);

      graph.squeakFilter.frequency.cancelScheduledValues(now);
      graph.squeakFilter.frequency.setValueAtTime(pitch, now);
      graph.squeakGain.gain.cancelScheduledValues(now);
      graph.squeakGain.gain.setValueAtTime(0.0001, now);
      graph.squeakGain.gain.exponentialRampToValueAtTime(peak, now + 0.007);
      graph.squeakGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.052);

      if (intensity > 0.45) {
        const second = now + 0.058;
        graph.squeak.frequency.setValueAtTime(pitch * 0.86, second);
        graph.squeak.frequency.exponentialRampToValueAtTime(pitch * 1.08, second + 0.009);
        graph.squeak.frequency.exponentialRampToValueAtTime(pitch * 0.64, second + 0.05);
        graph.squeakGain.gain.setValueAtTime(0.0001, second);
        graph.squeakGain.gain.exponentialRampToValueAtTime(peak * 0.72, second + 0.006);
        graph.squeakGain.gain.exponentialRampToValueAtTime(0.0001, second + 0.048);
      }
    }
  }

  function fadeScrubSound() {
    if (!audio) return;
    const now = audio.audioCtx.currentTime;
    audio.gain.gain.cancelScheduledValues(now);
    audio.gain.gain.setTargetAtTime(0, now, 0.06);
    audio.squeakGain.gain.cancelScheduledValues(now);
    audio.squeakGain.gain.setTargetAtTime(0, now, 0.025);
  }

  // 最初に画面へ触れたタイミングでフルスクリーンへ（ブラウザはユーザー操作必須のため）
  let fullscreenTried = false;
  function tryFullscreen() {
    if (fullscreenTried) return;
    fullscreenTried = true;
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) req.call(el).catch(() => {});
  }

  // 一定時間操作がなければ曇りガラスを初期状態に戻す
  const IDLE_MS = 60000;
  let idleTimer = null;
  function resetIdleTimer() {
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      if (photo.complete && photo.naturalWidth > 0) paintFog();
    }, IDLE_MS);
  }

  let drawing = false;
  function onDown(e) {
    tryFullscreen();
    resetIdleTimer();
    drawing = true;
    stage.classList.add('dragging');
    canvas.setPointerCapture?.(e.pointerId);
    lastPoint = pointerPos(e);
    lastSoundPoint = lastPoint;
    lastSoundTime = e.timeStamp || performance.now();
    eraseAt(lastPoint.x, lastPoint.y, null);
    setScrubSound(80);
  }
  function onMove(e) {
    if (!drawing) return;
    resetIdleTimer();
    const p = pointerPos(e);
    eraseAt(p.x, p.y, lastPoint);
    const now = e.timeStamp || performance.now();
    const dt = Math.max(16, now - lastSoundTime);
    const dist = lastSoundPoint ? Math.hypot(p.x - lastSoundPoint.x, p.y - lastSoundPoint.y) : 0;
    setScrubSound((dist / dt) * 1000, dist);
    lastPoint = p;
    lastSoundPoint = p;
    lastSoundTime = now;
  }
  function onUp() {
    drawing = false;
    stage.classList.remove('dragging');
    lastPoint = null;
    lastSoundPoint = null;
    fadeScrubSound();
  }

  canvas.style.pointerEvents = 'auto';
  canvas.addEventListener('pointerdown', onDown);
  canvas.addEventListener('pointermove', onMove);
  canvas.addEventListener('pointerup', onUp);
  canvas.addEventListener('pointercancel', onUp);
  canvas.addEventListener('pointerleave', onUp);

  reloadBtn.addEventListener('click', () => {
    const seed = Math.random().toString(36).slice(2, 9);
    setLoading(true);
    photo.src = `https://picsum.photos/seed/${seed}/1600/1000`;
    // 画像 onload で resize() → paintFog() が走り、フォグも初期なぞり跡もリセットされる
  });

  photo.addEventListener('load', () => {
    setLoading(false);
    resize();
    resetIdleTimer();
  });
  photo.addEventListener('error', () => setLoading(false));
  window.addEventListener('resize', resize);

  if (photo.complete && photo.naturalWidth > 0) {
    resize();
    resetIdleTimer();
  } else {
    setLoading(true);
  }
})();
</script>
</body>
</html>
